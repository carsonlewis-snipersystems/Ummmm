<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Ummmmm Counter</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" />
<style>
  :root {
    --bg: #07080d;
    --text: #f3f4fb;
    --text-soft: rgba(243,244,251,0.60);
    --text-faint: rgba(243,244,251,0.34);
    --card: rgba(255,255,255,0.045);
    --card-border: rgba(255,255,255,0.10);
    --field: rgba(255,255,255,0.05);
    --divider: rgba(255,255,255,0.08);
    --umm: #a78bfa;
    --umm-2: #7c5cff;
    --umm-glow: rgba(124,92,255,0.45);
    --hmm: #4be3c8;
    --hmm-2: #22d3ee;
    --hmm-glow: rgba(40,210,200,0.42);
    --online: #4be3a0;
    --offline: #ff6b6b;
  }
  * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
  html, body { margin: 0; padding: 0; min-height: 100vh; }
  body {
    background: var(--bg);
    background-image:
      radial-gradient(900px circle at 12% -8%, rgba(124,92,255,0.22), transparent 55%),
      radial-gradient(900px circle at 92% 108%, rgba(34,211,238,0.18), transparent 55%);
    background-attachment: fixed;
    color: var(--text);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  input { font-family: inherit; outline: none; }
  input:focus { border-color: rgba(167,139,250,0.55); box-shadow: 0 0 0 3px rgba(124,92,255,0.18); }

  .btn {
    border: 0; border-radius: 14px; cursor: pointer;
    font-family: 'Inter', sans-serif; font-weight: 600;
    transition: transform 0.12s ease, box-shadow 0.2s ease, background 0.2s ease, border-color 0.2s ease, color 0.2s ease;
  }
  .btn:active { transform: translateY(1px) scale(0.99); }
  .count-btn {
    padding: 18px 16px; font-size: 16px; letter-spacing: 0.3px; color: #0a0b12;
  }
  .btn-umm { background: linear-gradient(135deg, var(--umm) 0%, var(--umm-2) 100%); box-shadow: 0 10px 26px -10px var(--umm-glow); }
  .btn-umm:hover { box-shadow: 0 14px 34px -10px var(--umm-glow); transform: translateY(-1px); }
  .btn-hmm { background: linear-gradient(135deg, var(--hmm) 0%, var(--hmm-2) 100%); box-shadow: 0 10px 26px -10px var(--hmm-glow); }
  .btn-hmm:hover { box-shadow: 0 14px 34px -10px var(--hmm-glow); transform: translateY(-1px); }
  .btn-ghost {
    background: rgba(255,255,255,0.04); border: 1px solid var(--divider);
    color: var(--text-soft); padding: 12px; font-size: 13px;
  }
  .btn-ghost:hover { background: rgba(255,255,255,0.08); color: var(--text); }
  .btn-danger {
    background: transparent; border: 1px solid rgba(255,107,107,0.35);
    color: #ff8585; padding: 12px; font-size: 13px;
  }
  .btn-danger:hover { background: rgba(255,107,107,0.10); border-color: rgba(255,107,107,0.6); }
  .mini {
    border: 1px solid var(--divider); background: rgba(255,255,255,0.04); color: var(--text-soft);
    border-radius: 9px; cursor: pointer; padding: 6px 11px; font-family: 'Inter', sans-serif;
    font-size: 12px; font-weight: 500; transition: background 0.2s ease, color 0.2s ease;
  }
  .mini:hover { background: rgba(255,255,255,0.09); color: var(--text); }

  @media (prefers-reduced-motion: reduce) {
    * { animation: none !important; transition: none !important; }
  }
</style>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef, useCallback, useMemo } = React;

/* ---------- identity + room helpers ---------- */
const ADJS = ['swift','silent','lazy','bold','hidden','crimson','velvet','misty','iron','gilded','amber','silver','wandering','sleepy','sly','cobalt'];
const NOUNS = ['otter','fox','falcon','fern','ember','tide','glade','hawk','dune','oak','crow','wren','lake','beacon','cipher','ledger'];

function sanitizeTopic(s) {
  const cleaned = (s || '').toLowerCase().replace(/[^a-z0-9-]+/g, '-').replace(/^-+|-+$/g, '').slice(0, 60);
  return 'claude-tally-' + (cleaned || 'untitled');
}
/* extrapolate clicks-per-hour from the spacing of the most recent clicks.
   needs >=2 clicks; the window stretches to `now`, so an idle gap decays the rate. */
function ratePerHour(times, now) {
  if (times.length < 2) return 0;
  const recent = times.slice(-6);
  const intervals = recent.length - 1;
  const span = Math.max(now, recent[recent.length - 1]) - recent[0];
  if (span <= 0) return 0;
  return Math.round(intervals / span * 3600000);
}
function generateRoomName() {
  const a = ADJS[Math.floor(Math.random() * ADJS.length)];
  const n = NOUNS[Math.floor(Math.random() * NOUNS.length)];
  return `${a}-${n}-${Math.floor(1000 + Math.random() * 9000)}`;
}
function generateMe() {
  const codes = 'ABCDEFGHJKLMNPQRSTUVWXYZ';
  const id = codes[Math.floor(Math.random()*codes.length)] + codes[Math.floor(Math.random()*codes.length)] + Math.floor(10 + Math.random()*89);
  return { user_id: 'u_' + Math.random().toString(36).slice(2, 12), code_name: 'AGENT ' + id };
}
function uuid() {
  if (typeof crypto !== 'undefined' && crypto.randomUUID) return crypto.randomUUID();
  return 'e_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
}
const lsGet = (k, d) => { try { const v = localStorage.getItem('tally:' + k); return v == null ? d : JSON.parse(v); } catch { return d; } };
const lsSet = (k, v) => { try { localStorage.setItem('tally:' + k, JSON.stringify(v)); } catch {} };

function initialRoom() {
  const m = (location.hash || '').match(/room=([^&]+)/);
  if (m) return decodeURIComponent(m[1]);
  return lsGet('room', null) || generateRoomName();
}

/* ---------- main app ---------- */
function TallyDossier() {
  const me = useMemo(() => {
    const stored = lsGet('me', null);
    if (stored && stored.user_id) return stored;
    const fresh = generateMe(); lsSet('me', fresh); return fresh;
  }, []);

  const [room, setRoom] = useState(initialRoom);
  const [roomDraft, setRoomDraft] = useState(room);
  const [marks, setMarks] = useState([]);          // {id,user_id,code_name,ts,type}
  const [online, setOnline] = useState(false);
  const [agents, setAgents] = useState({});         // user_id -> {code_name, last}
  const [flash, setFlash] = useState(null);         // 'self' | 'other' | null
  const [copied, setCopied] = useState(false);
  const [now, setNow] = useState(Date.now());

  const wsRef = useRef(null);
  const seen = useRef(new Set());
  const wipeTs = useRef(0);
  const reconnectRef = useRef(null);
  const flashTimer = useRef(null);

  const topic = useMemo(() => sanitizeTopic(room), [room]);

  /* persist room + reflect in URL */
  useEffect(() => {
    lsSet('room', room);
    setRoomDraft(room);
    try { history.replaceState(null, '', '#room=' + encodeURIComponent(room)); } catch {}
  }, [room]);

  /* apply one event to local state */
  const apply = useCallback((ev) => {
    if (!ev || !ev.id || seen.current.has(ev.id)) return;
    seen.current.add(ev.id);
    if (ev.type === 'wipe') {
      wipeTs.current = Math.max(wipeTs.current, ev.ts || 0);
      setMarks(prev => prev.filter(m => m.ts > wipeTs.current));
      return;
    }
    if (ev.ts && ev.ts <= wipeTs.current) return; // pre-wipe, ignore
    if (ev.type === 'add') {
      setMarks(prev => prev.some(m => m.id === ev.id) ? prev
        : [...prev, { id: ev.id, user_id: ev.user_id, code_name: ev.code_name, ts: ev.ts, mark_type: ev.mark_type }].sort((a,b)=>a.ts-b.ts));
      setAgents(prev => ({ ...prev, [ev.user_id]: { code_name: ev.code_name, last: Date.now() } }));
      if (ev.user_id !== me.user_id) doFlash('other');
    } else if (ev.type === 'undo' && ev.target) {
      setMarks(prev => prev.filter(m => m.id !== ev.target));
    }
  }, [me.user_id]);

  /* tick once a second so the per-hour pace decays in real time */
  useEffect(() => {
    const t = setInterval(() => setNow(Date.now()), 1000);
    return () => clearInterval(t);
  }, []);

  const doFlash = useCallback((who) => {
    setFlash(who);
    clearTimeout(flashTimer.current);
    flashTimer.current = setTimeout(() => setFlash(null), 260);
  }, []);

  /* connect / reconnect to ntfy over websocket, replaying cache */
  useEffect(() => {
    let killed = false;
    seen.current = new Set();
    wipeTs.current = 0;
    setMarks([]);
    setAgents({});

    function connect() {
      if (killed) return;
      try { wsRef.current && wsRef.current.close(); } catch {}
      const ws = new WebSocket(`wss://ntfy.sh/${topic}/ws?since=12h`);
      wsRef.current = ws;
      ws.onopen = () => { if (!killed) setOnline(true); };
      ws.onmessage = (e) => {
        let frame; try { frame = JSON.parse(e.data); } catch { return; }
        if (frame.event !== 'message') return;
        let payload; try { payload = JSON.parse(frame.message); } catch { return; }
        apply(payload);
      };
      ws.onclose = () => {
        if (killed) return;
        setOnline(false);
        clearTimeout(reconnectRef.current);
        reconnectRef.current = setTimeout(connect, 1500);
      };
      ws.onerror = () => { try { ws.close(); } catch {} };
    }
    connect();

    return () => {
      killed = true;
      clearTimeout(reconnectRef.current);
      try { wsRef.current && wsRef.current.close(); } catch {}
      setOnline(false);
    };
  }, [topic, apply]);

  /* publish an event to the channel */
  const publish = useCallback(async (ev) => {
    apply(ev); // optimistic local
    try {
      await fetch(`https://ntfy.sh/${topic}`, {
        method: 'POST',
        headers: { 'Priority': 'min', 'X-Title': 'tally' },
        body: JSON.stringify(ev),
      });
    } catch {}
  }, [topic, apply]);

  const addMark = useCallback((markType) => {
    doFlash('self');
    publish({ id: uuid(), type: 'add', mark_type: markType, user_id: me.user_id, code_name: me.code_name, ts: Date.now() });
  }, [publish, me, doFlash]);

  const undo = useCallback(() => {
    const mine = [...marks].reverse();
    const last = mine[0];
    if (!last) return;
    publish({ id: uuid(), type: 'undo', target: last.id, user_id: me.user_id, ts: Date.now() });
  }, [marks, publish, me]);

  const wipe = useCallback(() => {
    if (!window.confirm('Reset the counter for everyone on this channel?')) return;
    publish({ id: uuid(), type: 'wipe', user_id: me.user_id, ts: Date.now() });
  }, [publish, me]);

  const commitRoom = useCallback(() => {
    const next = roomDraft.trim();
    if (next && next !== room) setRoom(next);
    else setRoomDraft(room);
  }, [roomDraft, room]);

  const newChannel = useCallback(() => setRoom(generateRoomName()), []);

  const copyLink = useCallback(async () => {
    const url = location.origin + location.pathname + '#room=' + encodeURIComponent(room);
    try { await navigator.clipboard.writeText(url); } catch {}
    setCopied(true); setTimeout(() => setCopied(false), 1600);
  }, [room]);

  const ummTimes = marks.filter(m => m.mark_type === 'umm').map(m => m.ts);
  const hmmmTimes = marks.filter(m => m.mark_type === 'hmmmm').map(m => m.ts);
  const ummCount = ummTimes.length;
  const hmmmCount = hmmmTimes.length;
  const ummPerHour = ratePerHour(ummTimes, now);
  const hmmmPerHour = ratePerHour(hmmmTimes, now);
  const others = Object.entries(agents).filter(([id]) => id !== me.user_id);

  return (
    <div style={{ maxWidth: 460, margin: '0 auto', padding: '48px 18px 64px', position: 'relative' }}>
      {/* flash overlay */}
      <div style={{
        position: 'fixed', inset: 0, pointerEvents: 'none', zIndex: 50,
        background: flash === 'self' ? 'radial-gradient(600px circle at 50% 50%, rgba(124,92,255,0.12), transparent 70%)'
          : flash === 'other' ? 'radial-gradient(600px circle at 50% 50%, rgba(40,210,200,0.12), transparent 70%)' : 'transparent',
        transition: 'background 0.25s ease',
      }} />

      {/* glass card */}
      <div style={{
        background: 'var(--card)',
        border: '1px solid var(--card-border)',
        backdropFilter: 'blur(22px)', WebkitBackdropFilter: 'blur(22px)',
        boxShadow: '0 1px 0 rgba(255,255,255,0.08) inset, 0 30px 70px -30px rgba(0,0,0,0.8)',
        borderRadius: 24,
        padding: '28px 24px 26px',
      }}>
        {/* header */}
        <div style={{ textAlign: 'center', marginBottom: 22 }}>
          <div style={{ display: 'inline-flex', alignItems: 'center', gap: 7, fontSize: 11, fontWeight: 600, letterSpacing: 1.5, color: 'var(--text-faint)', textTransform: 'uppercase' }}>
            <span style={{ width: 6, height: 6, borderRadius: '50%', background: online ? 'var(--online)' : 'var(--offline)', boxShadow: online ? '0 0 8px var(--online)' : 'none' }} />
            {online ? 'Live · Synced' : 'Reconnecting'}
          </div>
          <div style={{ fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: 32, letterSpacing: -0.5, marginTop: 10, color: 'var(--text)' }}>Ummmmm Counter</div>
          <div style={{ fontSize: 13, color: 'var(--text-soft)', marginTop: 6 }}>Tap to tally — everyone on the channel stays in sync.</div>
        </div>

        {/* channel control */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap', paddingBottom: 14, borderBottom: '1px solid var(--divider)' }}>
          <span style={{ fontSize: 11, fontWeight: 600, letterSpacing: 1, color: 'var(--text-faint)', textTransform: 'uppercase' }}>Channel</span>
          <input
            value={roomDraft}
            onChange={(e) => setRoomDraft(e.target.value)}
            onBlur={commitRoom}
            onKeyDown={(e) => { if (e.key === 'Enter') e.target.blur(); }}
            spellCheck={false}
            style={{
              flex: 1, minWidth: 150, background: 'var(--field)',
              border: '1px solid var(--divider)', borderRadius: 10, padding: '9px 12px',
              fontSize: 13, fontWeight: 500, color: 'var(--text)', letterSpacing: 0.2,
              transition: 'border-color 0.2s ease, box-shadow 0.2s ease',
            }}
          />
        </div>

        <div style={{ display: 'flex', gap: 8, padding: '12px 0 0', justifyContent: 'space-between', alignItems: 'center', flexWrap: 'wrap' }}>
          <div style={{ fontSize: 13, color: 'var(--text-soft)' }}>
            You are <b style={{ color: 'var(--text)', fontWeight: 600 }}>{me.code_name}</b>
            {others.length > 0 && <span> · with <b style={{ color: 'var(--hmm)', fontWeight: 600 }}>{others.map(([,a]) => a.code_name).join(', ')}</b></span>}
          </div>
          <div style={{ display: 'flex', gap: 6 }}>
            <button onClick={copyLink} className="mini">{copied ? 'copied ✓' : 'copy link'}</button>
            <button onClick={newChannel} className="mini">new channel</button>
          </div>
        </div>

        {/* count */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 14, padding: '24px 0 22px' }}>
          <Stat label="Ummm" count={ummCount} rate={ummPerHour} accent="var(--umm)" accent2="var(--umm-2)" glow="var(--umm-glow)" />
          <Stat label="Hmmm" count={hmmmCount} rate={hmmmPerHour} accent="var(--hmm)" accent2="var(--hmm-2)" glow="var(--hmm-glow)" />
        </div>

        {/* controls */}
        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10 }}>
          <button onClick={() => addMark('umm')} className="btn count-btn btn-umm">+ Ummm</button>
          <button onClick={() => addMark('hmmmm')} className="btn count-btn btn-hmm">+ Hmmm</button>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, gridColumn: '1 / -1' }}>
            <button onClick={undo} className="btn btn-ghost">Undo</button>
            <button onClick={wipe} className="btn btn-danger">Reset</button>
          </div>
        </div>

        <div style={{ textAlign: 'center', marginTop: 20, fontSize: 12, color: 'var(--text-faint)' }}>
          Share the channel link · same channel = same count
        </div>
      </div>
    </div>
  );
}

/* a single counter column: big gradient number, label, live per-hour rate */
function Stat({ label, count, rate, accent, accent2, glow }) {
  return (
    <div style={{
      background: 'rgba(255,255,255,0.025)', border: '1px solid var(--divider)',
      borderRadius: 16, padding: '18px 12px 14px', textAlign: 'center',
    }}>
      <div style={{
        fontFamily: "'Space Grotesk', sans-serif", fontWeight: 700, fontSize: 60, lineHeight: 1,
        fontVariantNumeric: 'tabular-nums',
        background: `linear-gradient(180deg, ${accent} 0%, ${accent2} 100%)`,
        WebkitBackgroundClip: 'text', backgroundClip: 'text', color: 'transparent',
        textShadow: `0 0 28px ${glow}`,
      }}>
        {String(count).padStart(2, '0')}
      </div>
      <div style={{ fontSize: 12, fontWeight: 600, letterSpacing: 1.5, color: 'var(--text-soft)', textTransform: 'uppercase', marginTop: 8 }}>{label}</div>
      <div style={{ fontSize: 12, fontWeight: 500, color: 'var(--text-faint)', marginTop: 4 }}>
        <span style={{ color: accent }}>{rate}</span> / hr
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<TallyDossier />);
</script>
</body>
</html>
